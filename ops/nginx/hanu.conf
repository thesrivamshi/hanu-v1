# /etc/nginx/sites-available/hanu  (then `ln -s` into sites-enabled).
# Replace ${HANU_HOST} with the chosen hostname before applying.
# After certbot --nginx -d ${HANU_HOST} --redirect, this is roughly the
# resulting config (the redirect server is generated by certbot).

server {
  listen 443 ssl http2;
  server_name ${HANU_HOST};
  root /var/www/hanu;
  index index.html;

  ssl_certificate     /etc/letsencrypt/live/${HANU_HOST}/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/${HANU_HOST}/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  # SPA fallback for the Babel-in-browser bundle.
  location / {
    try_files $uri /index.html;
  }

  # Long-cache hashed assets (post-Vite build; harmless before that).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Healthcheck proxied to FastAPI on 127.0.0.1:8088.
  location /healthz {
    proxy_pass http://127.0.0.1:8088/healthz;
    proxy_set_header Host $host;
    access_log off;
  }
}

# certbot will create a separate server block on port 80 redirecting to HTTPS.
